<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tetris Game</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Core layout properties that must remain inline for compatibility */
        body {
            overscroll-behavior: none;        /* prevent pull-to-refresh */
        }

        .game-board {
            touch-action: none;         /* prevent browser gestures on game board container */
        }

        canvas#gameCanvas {
            touch-action: none;         /* prevent browser gestures on game canvas */
        }

        /* Next piece preview panel */
        .next-piece-panel {
            background: rgba(0, 255, 255, 0.05);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(0, 255, 255, 0.2);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.08);
            text-align: center;
        }

        .next-piece-panel h3 {
            margin-bottom: 12px;
            text-align: center;
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.6);
            letter-spacing: 2px;
        }

        .next-piece-canvas-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 8px;
        }

        canvas#nextPieceCanvas {
            display: block;
            background: rgba(0, 0, 8, 0.95);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 6px;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.15), inset 0 0 15px rgba(0, 0, 0, 0.6);
        }

        /* Initials input styling */
        .initials-input {
            width: 70px;
            padding: 8px;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 4px;
            background: rgba(0, 255, 255, 0.08);
            border: 1px solid rgba(0, 255, 255, 0.4);
            border-radius: 8px;
            color: #00ffff;
            outline: none;
            font-family: 'Arial', sans-serif;
        }

        .initials-input:focus {
            border-color: #00ffff;
            box-shadow: 0 0 12px rgba(0, 255, 255, 0.4);
        }

        .initials-input::placeholder {
            color: rgba(0, 255, 255, 0.3);
        }

        /* Leaderboard table */
        .leaderboard-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        /* Show keyboard controls by default, hide touch controls */
        .touch-controls {
            display: none;
        }

        /* On touch-capable devices, show touch controls instead */
        @media (pointer: coarse) {
            .keyboard-controls {
                display: none;
            }
            .touch-controls {
                display: block;
            }
        }

        @media (max-width: 768px) {
            .game-container {
                flex-direction: column;
                align-items: center;
                padding: 15px;
                gap: 15px;
            }

            .game-board {
                width: 250px;
                height: 500px;
            }

            .game-info {
                flex-direction: row;
                flex-wrap: wrap;
                width: 100%;
                justify-content: space-around;
            }

            .buttons {
                flex-direction: row;
            }

            .game-title {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <!-- Animated background canvas -->
    <canvas id="bgCanvas"></canvas>

    <div class="game-container">
        <div class="game-board">
            <canvas id="gameCanvas" width="300" height="600"></canvas>
            <div class="game-over" id="gameOverModal">
                <h2>Game Over!</h2>
                <p>Final Score: <span id="finalScore">0</span></p>
                <p>Lines Cleared: <span id="finalLines">0</span></p>

                <div id="highScoreSection" class="high-score-section" style="display:none;">
                    <p class="high-score-msg">New High Score!</p>
                    <div class="initials-form">
                        <input type="text" id="initialsInput" class="initials-input" maxlength="3" placeholder="AAA" autocomplete="off" />
                        <button class="game-btn submit-score-btn" onclick="submitScore()">Submit Score</button>
                    </div>
                </div>

                <div class="leaderboard-section">
                    <h3 class="leaderboard-title">Leaderboard</h3>
                    <table class="leaderboard-table">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Name</th>
                                <th>Score</th>
                                <th>Lines</th>
                            </tr>
                        </thead>
                        <tbody id="leaderboardBody">
                        </tbody>
                    </table>
                </div>

                <button class="game-btn restart-btn" onclick="startNewGame()">Play Again</button>
            </div>
        </div>

        <div class="game-info">
            <div class="game-title">TETRIS</div>

            <div class="score-panel">
                <h3>SCORE</h3>
                <div class="score-item">
                    <span>Score:</span>
                    <span id="score">0</span>
                </div>
                <div class="score-item">
                    <span>Lines:</span>
                    <span id="lines">0</span>
                </div>
                <div class="score-item">
                    <span>Level:</span>
                    <span id="level">1</span>
                </div>
            </div>

            <div class="next-piece-panel" id="nextPiecePanel">
                <h3>NEXT</h3>
                <div class="next-piece-canvas-wrapper">
                    <canvas id="nextPieceCanvas" width="120" height="120"></canvas>
                </div>
            </div>

            <div class="controls">
                <h3>CONTROLS</h3>
                <div class="keyboard-controls">
                    <div class="control-item"><kbd>← →</kbd> Move</div>
                    <div class="control-item"><kbd>↓</kbd> Soft Drop</div>
                    <div class="control-item"><kbd>↑</kbd> Rotate</div>
                    <div class="control-item"><kbd>Space</kbd> Hard Drop</div>
                    <div class="control-item"><kbd>P</kbd> Pause</div>
                </div>
                <div class="touch-controls">
                    <div class="control-item"><kbd>Drag ← →</kbd> Move</div>
                    <div class="control-item"><kbd>Drag ↓</kbd> Soft Drop</div>
                    <div class="control-item"><kbd>Hold</kbd> Hard Drop</div>
                    <div class="control-item"><kbd>Tap / ↑</kbd> Rotate</div>
                </div>
            </div>

            <div class="buttons">
                <button class="game-btn start-btn" id="startBtn" onclick="startGame()">Start Game</button>
                <button class="game-btn restart-btn" id="restartBtn" onclick="restartGame()">Restart</button>
                <button class="game-btn pause-btn" id="pauseBtn" onclick="pauseGame()">Pause</button>
            </div>

            <div class="leaderboard-panel">
                <h3>LEADERBOARD</h3>
                <div class="initials-entry">
                    <input type="text" id="initialsInput" maxlength="3" placeholder="AAA" class="initials-input">
                    <button class="game-btn start-btn" onclick="submitScore()">Submit</button>
                </div>
                <table class="leaderboard-table">
                    <thead>
                        <tr><th>#</th><th>Name</th><th>Score</th></tr>
                    </thead>
                    <tbody id="leaderboardBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
